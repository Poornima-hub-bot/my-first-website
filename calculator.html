<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(to right, #667eea, #764ba2);
            font-family: Arial;
        }

        .calculator {
            background: #222;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .display {
            width: 100%;
            height: 60px;
            margin-bottom: 15px;
            text-align: right;
            font-size: 24px;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: #333;
            color: white;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 60px);
            gap: 10px;
        }

        button {
            height: 60px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .num { background: #444; color: white; }
        .operator { background: #ff9500; color: white; }
        .equal { background: #34c759; color: white; grid-column: span 2; }
        .clear { background: #ff3b30; color: white; grid-column: span 2; }

        button:hover {
            opacity: 0.8;
        }

        a {
            color: white;
            display: block;
            margin-bottom: 10px;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="calculator">
    <a href="index.html">⬅ Back</a>
    <input type="text" id="display" class="display" disabled>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="press('/')">/</button>
        <button class="operator" onclick="press('*')">*</button>

        <button class="num" onclick="press('7')">7</button>
        <button class="num" onclick="press('8')">8</button>
        <button class="num" onclick="press('9')">9</button>
        <button class="operator" onclick="press('-')">-</button>

        <button class="num" onclick="press('4')">4</button>
        <button class="num" onclick="press('5')">5</button>
        <button class="num" onclick="press('6')">6</button>
        <button class="operator" onclick="press('+')">+</button>

        <button class="num" onclick="press('1')">1</button>
        <button class="num" onclick="press('2')">2</button>
        <button class="num" onclick="press('3')">3</button>

        <button class="num" onclick="press('0')">0</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
function press(val) {
    document.getElementById("display").value += val;
}

function calculate() {
    try {
        let result = eval(document.getElementById("display").value);
        document.getElementById("display").value = result;
    } catch {
        document.getElementById("display").value = "Error";
    }
}

function clearDisplay() {
    document.getElementById("display").value = "";
}
</script>

</body>
</html>
